<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darul Islam Chuzhali - Fee Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        :root { --primary: #00695c; --bg: #f0f4f3; --pending: #d32f2f; --header-bg: #e0f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .main-header { background: var(--header-bg); text-align: center; padding: 20px 10px; border-bottom: 5px solid var(--primary); }
        .madrasa-name { color: var(--primary); font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .sub-text { color: #444; font-size: 14px; font-weight: bold; margin-top: 3px; }
        /* ബിസ്മി സ്റ്റൈൽ */
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 30px; color: var(--primary); margin: 10px 0; display: block; direction: rtl; }
        
        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; color: white; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 15px; }
        .tab-btn.active { background: #004d40; border-bottom: 4px solid #ffeb3b; }
        
        .container { max-width: 1000px; margin: 10px auto; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); flex: 1; width: 95%; }
        .page { display: none; }
        .page.active { display: block; }
        
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .controls { display: flex; gap: 5px; background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .filter-group { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
        .filter-group select { width: auto; font-size: 12px; padding: 6px; }
        
        .print-btn { background: #333; color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .total-box { background: #2e7d32; color: white; padding: 10px; border-radius: 6px; margin: 10px 0; text-align: center; font-size: 18px; font-weight: bold; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; min-width: 450px; font-size: 13px; }
        th, td { padding: 8px 6px; border: 1px solid #eee; text-align: left; }
        th { background: #f4f7f6; color: #333; font-weight: bold; }
        tr:nth-child(even) { background-color: #fafafa; }

        footer { text-align: center; padding: 15px; background: #fdfdfd; color: #777; font-size: 12px; border-top: 1px solid #eee; margin-top: 20px; }
        .dev-link { color: var(--primary); font-weight: bold; text-decoration: none; }

        @media print { .tabs, .controls, .submit-btn, footer { display: none !important; } }
    </style>
</head>
<body>

<div class="main-header">
    <h1 class="madrasa-name">DARUL ISLAM CHUZHALI</h1>
    <p class="sub-text">FEE MANAGEMENT SYSTEM</p>
    <span class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openPage('entryPage', this)">Entry</button>
    <button class="tab-btn" onclick="openPage('recordPage', this)">Records</button>
</div>

<div class="container">
    <div id="entryPage" class="page active">
        <h3 style="text-align:center; color:var(--primary); margin: 10px 0;">New Fee Entry</h3>
        <form id="feeForm">
            <div style="margin-bottom:10px;"><label style="font-size:14px; font-weight:bold;">വിദ്യാർത്ഥിയുടെ പേര്</label><input type="text" name="name" required></div>
            <div style="margin-bottom:10px;"><label style="font-size:14px; font-weight:bold;">ക്ലാസ്</label><select name="class" required><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script></select></div>
            <div style="margin-bottom:10px;"><label style="font-size:14px; font-weight:bold;">ഫീ ഇനം</label><select name="feeType"><option value="Madrasa Fee">Madrasa Fee</option><option value="Bus Fee">Bus Fee</option><option value="Exam Fee">Exam Fee</option></select></div>
            <div style="margin-bottom:10px;"><label style="font-size:14px; font-weight:bold;">മാസം</label><select name="month" id="mSelect"><script>const months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; months.forEach(m => document.write(`<option value="${m}">${m}</option>`));</script></select></div>
            <div style="margin-bottom:10px;"><label style="font-size:14px; font-weight:bold;">വർഷം</label><select name="year"><option value="2026" selected>2026</option><option value="2025">2025</option></select></div>
            <div style="margin-bottom:10px;"><label style="font-size:14px; font-weight:bold;">തുക</label><input type="number" name="amount" required></div>
            <button type="submit" id="saveBtn" class="submit-btn">SAVE DATA</button>
        </form>
        <p id="msg" style="text-align:center; font-weight:bold; color: green; font-size:14px;"></p>
    </div>

    <div id="recordPage" class="page">
        <h3 style="text-align:center; color:var(--primary); margin: 10px 0;">Records</h3>
        <div class="controls">
            <div class="filter-group">
                <select id="yearFilter" onchange="loadData()"><option value="2026">2026</option><option value="2025">2025</option></select>
                <select id="monthFilter" onchange="loadData()"><script>months.forEach(m => document.write(`<option value="${m}">${m}</option>`));</script></select>
                <select id="classFilter" onchange="applyFilters()"><option value="All">All</option><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Cls ${i}</option>`);</script></select>
                <select id="typeFilter" onchange="applyFilters()"><option value="All">All Types</option><option value="Madrasa Fee">Madrasa</option><option value="Bus Fee">Bus</option><option value="Exam Fee">Exam</option></select>
            </div>
            <button onclick="window.print()" class="print-btn">🖨️</button>
        </div>
        <div class="table-container"><table><thead><tr><th>Date</th><th>Name</th><th>Cls</th><th>Type</th><th>Amt</th></tr></thead><tbody id="paidBody"></tbody></table></div>
        <div id="totalDisplay" class="total-box">Total: ₹0</div>
        <h4 style="color:var(--pending); margin: 15px 0 5px 0; font-size:14px;">⚠️ Pending List</h4>
        <div class="table-container"><table><thead><tr><th>Name</th><th>Cls</th><th>Status</th></tr></thead><tbody id="pendingBody"></tbody></table></div>
    </div>
</div>

<footer>
    <p>© 2026 Darul Islam Chuzhali</p>
    <p>Developed by <a href="https://www.instagram.com/Ameen.azhari_/" class="dev-link" target="_blank">Ameen Azhari</a></p>
</footer>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby8qE1U6YgubT15Gm3T76xNvfN0zgW2Prn7ngUcn3r3jNP_XGLRQeAWAu5yLulDiu37/exec';
    let rawData = [];
    let pendingData = [];

    function openPage(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id === 'recordPage') loadData();
    }

    function loadData() {
        let m = document.getElementById('monthFilter').value;
        let y = document.getElementById('yearFilter').value;
        document.getElementById('paidBody').innerHTML = "<tr><td colspan='5' align='center'>...</td></tr>";
        fetch(`${scriptURL}?month=${m}&year=${y}`).then(r => r.json()).then(d => {
            rawData = d.allData || []; pendingData = d.pending || []; applyFilters();
        });
    }

    function applyFilters() {
        let cf = document.getElementById('classFilter').value;
        let tf = document.getElementById('typeFilter').value;
        let mf = document.getElementById('monthFilter').value;
        let yf = document.getElementById('yearFilter').value;
        let pHTML = ""; let total = 0;
        rawData.slice(1).forEach(r => {
            if(r[5] == mf && r[6] == yf && (cf == "All" || r[2] == cf) && (tf == "All" || r[3] == tf)) {
                let amt = parseFloat(r[4]) || 0; total += amt;
                pHTML += `<tr><td>${r[0].split('T')[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3].replace(' Fee','')}</td><td>₹${amt}</td></tr>`;
            }
        });
        document.getElementById('paidBody').innerHTML = pHTML || "<tr><td colspan='5' align='center'>No records</td></tr>";
        document.getElementById('totalDisplay').innerText = "Total: ₹" + total;

        let pendHTML = "";
        pendingData.forEach(s => {
            if(cf == "All" || s[1] == cf) {
                pendHTML += `<tr><td>${s[0]}</td><td>${s[1]}</td><td style="color:red">❌</td></tr>`;
            }
        });
        document.getElementById('pendingBody').innerHTML = pendHTML || "<tr><td colspan='3' align='center' style='color:green;'>OK ✅</td></tr>";
    }

    document.getElementById('feeForm').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('msg').innerText = "Saving...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(() => { alert("Success!"); window.location.reload(); })
            .catch(() => { alert("Error!"); document.getElementById('saveBtn').disabled = false; });
    });

    window.onload = loadData;
</script>
</body>
</html>
