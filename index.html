<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darul Islam Chuzhali - Fee Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        :root { --primary: #00695c; --bg: #f0f4f3; --pending: #d32f2f; --header-bg: #e0f2f1; --edit: #1976d2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .main-header { background: var(--header-bg); text-align: center; padding: 15px 10px; border-bottom: 5px solid var(--primary); }
        .madrasa-name { color: var(--primary); font-size: 22px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .sub-text { color: #444; font-size: 13px; font-weight: bold; margin-top: 2px; }
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 28px; color: var(--primary); margin: 8px 0; display: block; direction: rtl; }
        
        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 12px; color: white; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 14px; }
        .tab-btn.active { background: #004d40; border-bottom: 4px solid #ffeb3b; }
        
        .container { max-width: 1000px; margin: 10px auto; background: #fff; padding: 12px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); flex: 1; width: 95%; }
        .page { display: none; }
        .page.active { display: block; }
        
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; margin-top: 4px; }
        label { font-size: 13px; font-weight: bold; color: #333; }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .submit-btn.updating { background: var(--edit); }
        
        .controls { display: flex; gap: 5px; background: #e3f2fd; padding: 8px; border-radius: 8px; margin-bottom: 12px; align-items: center; justify-content: space-between; }
        .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .filter-group select { width: auto; font-size: 11px; padding: 5px; margin: 0; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; min-width: 400px; font-size: 13px; }
        th, td { padding: 8px 5px; border: 1px solid #eee; text-align: left; }
        th { background: #f4f7f6; font-weight: bold; }
        
        .edit-btn { background: var(--edit); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .total-box { background: #2e7d32; color: white; padding: 10px; border-radius: 6px; margin: 10px 0; text-align: center; font-size: 17px; font-weight: bold; }
        
        footer { text-align: center; padding: 15px; background: #fdfdfd; color: #777; font-size: 11px; border-top: 1px solid #eee; margin-top: auto; }
        .dev-link { color: var(--primary); font-weight: bold; text-decoration: none; }

        @media print { .tabs, .controls, .submit-btn, .edit-btn, footer { display: none !important; } }
    </style>
</head>
<body>

<div class="main-header">
    <h1 class="madrasa-name">DARUL ISLAM CHUZHALI</h1>
    <p class="sub-text">FEE MANAGEMENT SYSTEM</p>
    <span class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openPage('entryPage', this)">Entry</button>
    <button class="tab-btn" onclick="openPage('recordPage', this)">Records</button>
</div>

<div class="container">
    <div id="entryPage" class="page active">
        <h3 id="formTitle" style="text-align:center; color:var(--primary); margin-top:0;">New Fee Entry</h3>
        <form id="feeForm">
            <input type="hidden" name="rowId" id="rowId">
            <div style="margin-bottom:8px;"><label>വിദ്യാർത്ഥിയുടെ പേര്</label><input type="text" name="name" id="fName" required></div>
            <div style="margin-bottom:8px;"><label>ക്ലാസ്</label><select name="class" id="fClass" required><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script></select></div>
            <div style="margin-bottom:8px;"><label>ഫീ ഇനം</label><select name="feeType" id="fType"><option value="Madrasa Fee">Madrasa Fee</option><option value="Bus Fee">Bus Fee</option><option value="Exam Fee">Exam Fee</option></select></div>
            <div style="margin-bottom:8px;"><label>മാസം</label><select name="month" id="fMonth"><script>const months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; months.forEach(m => document.write(`<option value="${m}">${m}</option>`));</script></select></div>
            <div style="margin-bottom:8px;"><label>വർഷം</label><select name="year" id="fYear"><option value="2026">2026</option><option value="2025">2025</option></select></div>
            <div style="margin-bottom:8px;"><label>തുക</label><input type="number" name="amount" id="fAmount" required></div>
            <button type="submit" id="saveBtn" class="submit-btn">SAVE DATA</button>
            <button type="button" id="cancelBtn" style="display:none; width:100%; padding:10px; margin-top:8px; border:none; background:#ccc; border-radius:6px;" onclick="resetForm()">Cancel Edit</button>
        </form>
        <p id="msg" style="text-align:center; font-weight:bold; color: green; font-size:14px;"></p>
    </div>

    <div id="recordPage" class="page">
        <h3 style="text-align:center; color:var(--primary); margin-top:0;">Records</h3>
        <div class="controls">
            <div class="filter-group">
                <select id="yearFilter" onchange="loadData()"><option value="2026">2026</option><option value="2025">2025</option></select>
                <select id="monthFilter" onchange="loadData()"><script>months.forEach(m => document.write(`<option value="${m}">${m}</option>`));</script></select>
                <select id="classFilter" onchange="applyFilters()"><option value="All">All Cls</option><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Cls ${i}</option>`);</script></select>
                <select id="typeFilter" onchange="applyFilters()"><option value="All">All Types</option><option value="Madrasa Fee">Madrasa</option><option value="Bus Fee">Bus</option><option value="Exam Fee">Exam</option></select>
            </div>
            <button onclick="window.print()" style="background:none; border:none; font-size:16px; cursor:pointer;">🖨️</button>
        </div>
        <div class="table-container">
            <table><thead><tr><th>Name</th><th>Cls</th><th>Type</th><th>Amt</th><th>Action</th></tr></thead><tbody id="paidBody"></tbody></table>
        </div>
        <div id="totalDisplay" class="total-box">Total: ₹0</div>
    </div>
</div>

<footer>
    <p>© 2026 Darul Islam Chuzhali</p>
    <p>Developed by <a href="https://www.instagram.com/Ameen.azhari_/" class="dev-link" target="_blank">Ameen Azhari</a></p>
</footer>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxq3J_A6sjnaI003nua8sEV_EhfhkqibLt6iWRzWbQ3NUQL-QDP935oE-oA6KbT7iGc/exec';
    let rawData = [];

    function openPage(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id === 'recordPage') loadData();
    }

    function loadData() {
        let m = document.getElementById('monthFilter').value;
        let y = document.getElementById('yearFilter').value;
        document.getElementById('paidBody').innerHTML = "<tr><td colspan='5' align='center'>Loading...</td></tr>";
        fetch(`${scriptURL}?action=read`).then(r => r.json()).then(d => {
            rawData = d.allData || []; applyFilters();
        });
    }

    function applyFilters() {
        let cf = document.getElementById('classFilter').value;
        let tf = document.getElementById('typeFilter').value;
        let mf = document.getElementById('monthFilter').value;
        let yf = document.getElementById('yearFilter').value;
        let pHTML = ""; let total = 0;
        
        rawData.slice(1).forEach((r, index) => {
            if(r[5] == mf && r[6] == yf && (cf == "All" || r[2] == cf) && (tf == "All" || r[3] == tf)) {
                let amt = parseFloat(r[4]) || 0; total += amt;
                let realRow = index + 2; 
                pHTML += `<tr>
                    <td>${r[1]}</td>
                    <td>${r[2]}</td>
                    <td>${r[3].toString().replace(' Fee','')}</td>
                    <td>₹${amt}</td>
                    <td><button class="edit-btn" onclick="editEntry('${realRow}', '${r[1]}', '${r[2]}', '${r[3]}', '${r[5]}', '${r[6]}', '${r[4]}')">✏️</button></td>
                </tr>`;
            }
        });
        document.getElementById('paidBody').innerHTML = pHTML || "<tr><td colspan='5' align='center'>No records found.</td></tr>";
        document.getElementById('totalDisplay').innerText = "Total: ₹" + total;
    }

    function editEntry(row, name, cls, type, month, year, amt) {
        openPage('entryPage', document.querySelectorAll('.tab-btn')[0]);
        document.getElementById('rowId').value = row;
        document.getElementById('fName').value = name;
        document.getElementById('fClass').value = cls;
        document.getElementById('fType').value = type;
        document.getElementById('fMonth').value = month;
        document.getElementById('fYear').value = year;
        document.getElementById('fAmount').value = amt;
        
        document.getElementById('formTitle').innerText = "Update Entry";
        document.getElementById('formTitle').style.color = "var(--edit)";
        document.getElementById('saveBtn').innerText = "UPDATE DATA";
        document.getElementById('saveBtn').classList.add('updating');
        document.getElementById('cancelBtn').style.display = "block";
    }

    function resetForm() {
        document.getElementById('feeForm').reset();
        document.getElementById('rowId').value = "";
        document.getElementById('formTitle').innerText = "New Fee Entry";
        document.getElementById('formTitle').style.color = "var(--primary)";
        document.getElementById('saveBtn').innerText = "SAVE DATA";
        document.getElementById('saveBtn').classList.remove('updating');
        document.getElementById('cancelBtn').style.display = "none";
    }

    document.getElementById('feeForm').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('msg').innerText = "Processing...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(() => { alert("Success!"); resetForm(); window.location.reload(); })
            .catch(() => { alert("Error!"); document.getElementById('saveBtn').disabled = false; });
    });

    window.onload = loadData;
</script>
</body>
</html>
