<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darul Islam Madrasa Fee Portal</title>
    <style>
        :root {
            --primary-color: #00695c; /* Deep Green */
            --secondary-color: #1a73e8; /* Blue */
            --bg-color: #f0f4f8;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 10px; 
        }

        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-top: 8px solid var(--primary-color);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 { 
            color: var(--primary-color); 
            margin: 0; 
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p { 
            color: #666; 
            margin: 5px 0; 
            font-weight: bold;
        }

        /* Form Design */
        form { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }

        .form-group { display: flex; flex-direction: column; }
        
        label { margin-bottom: 5px; font-weight: 600; color: #444; }

        input, select { 
            padding: 12px; 
            border: 1.5px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(0,105,92,0.2);
            outline: none;
        }

        button { 
            grid-column: span 2; 
            padding: 15px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover { background-color: #004d40; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* Table Design */
        .table-section { margin-top: 40px; }
        
        .table-header {
            background: var(--secondary-color);
            color: white;
            padding: 10px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }

        .table-container { overflow-x: auto; }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white;
        }

        th, td { 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            text-align: left; 
        }

        th { background-color: #f8f9fa; color: #333; font-weight: bold; }
        
        tr:hover { background-color: #f1f8f7; }

        #message { text-align: center; font-weight: bold; margin: 15px 0; }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DARUL ISLAM MADRASA</h1>
        <p>CHUZHALI - FEE MANAGEMENT PORTAL</p>
    </div>
    
    <form id="feeForm">
        <div class="form-group">
            <label>വിദ്യാർത്ഥിയുടെ പേര്</label>
            <input type="text" name="name" placeholder="Enter Name" required>
        </div>

        <div class="form-group">
            <label>ക്ലാസ്</label>
            <select name="class" required>
                <option value="">Select Class</option>
                <option value="1">Class 1</option>
                <option value="2">Class 2</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11 (+1)</option>
                <option value="12">Class 12 (+2)</option>
            </select>
        </div>

        <div class="form-group">
            <label>ഫീ ഇനം</label>
            <select name="feeType" required>
                <option value="">Select Fee Type</option>
                <option value="Bus Fee">Bus Fee</option>
                <option value="Exam Fee">Exam Fee</option>
                <option value="Madrasa Fee">Madrasa Fee</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>തുക (Amount)</label>
            <input type="number" name="amount" placeholder="₹ 0.00" required>
        </div>
        
        <button type="submit" id="submitBtn">SUBMIT DATA</button>
    </form>

    <p id="message"></p>

    <div class="table-section">
        <div class="table-header">
            <h3>RECORDED TRANSACTIONS</h3>
        </div>
        <div class="table-container">
            <table id="feeTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Student Name</th>
                        <th>Class</th>
                        <th>Type</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align:center;">Loading records...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyxiq2tYeCgC5rjkNA1s0wlugceQiX4FMZ-8XE2bYlheEE_4IVYiZgfO36gdWUWYmw4/exec'; 
    const form = document.getElementById('feeForm');
    const msg = document.getElementById('message');
    const tableBody = document.getElementById('tableBody');

    function loadTableData() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                tableBody.innerHTML = ""; 
                if (data.length <= 1) {
                    tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No records found</td></tr>";
                    return;
                }
                for (let i = 1; i < data.length; i++) {
                    let row = `<tr>
                        <td>${data[i][0]}</td>
                        <td>${data[i][1]}</td>
                        <td>${data[i][2]}</td>
                        <td>${data[i][3]}</td>
                        <td>₹ ${data[i][4]}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                }
            })
            .catch(err => {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Error loading data!</td></tr>";
            });
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        msg.style.color = "#1a73e8";
        msg.innerHTML = "Processing...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.innerHTML = "Success! Data saved to sheet.";
                msg.style.color = "green";
                form.reset();
                btn.disabled = false;
                loadTableData();
            })
            .catch(error => {
                msg.innerHTML = "Error! Please try again.";
                msg.style.color = "red";
                btn.disabled = false;
            });
    });

    window.onload = loadTableData;
</script>

</body>
</html>
