<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darul Islam Chuzhali - Fee Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap');
        :root { --primary: #00695c; --bg: #f0f4f3; --pending: #d32f2f; --header-bg: #e0f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .main-header { background: var(--header-bg); text-align: center; padding: 30px 10px; border-bottom: 5px solid var(--primary); }
        .madrasa-name { color: var(--primary); font-size: 28px; font-weight: 900; margin: 0; }
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 32px; color: var(--primary); margin: 15px 0; display: block; direction: rtl; }
        .tabs { display: flex; background: var(--primary); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 18px; color: white; cursor: pointer; border: none; background: none; font-weight: bold; }
        .tab-btn.active { background: #004d40; border-bottom: 4px solid #ffeb3b; }
        .container { max-width: 1000px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .page { display: none; }
        .page.active { display: block; }
        .form-group { margin-bottom: 18px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .controls { display: flex; gap: 8px; background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .total-box { background: #2e7d32; color: white; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; font-size: 22px; font-weight: bold; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; min-width: 500px; }
        th, td { padding: 14px; border: 1px solid #eee; text-align: left; }
        th { background: #f4f7f6; color: #333; }
        @media print { .tabs, .controls, .submit-btn { display: none !important; } }
    </style>
</head>
<body>

<div class="main-header">
    <h1 class="madrasa-name">DARUL ISLAM CHUZHALI</h1>
    <span class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openPage('entryPage', this)">Entry</button>
    <button class="tab-btn" onclick="openPage('recordPage', this)">Records</button>
</div>

<div class="container">
    <div id="entryPage" class="page active">
        <h3 style="text-align:center; color:var(--primary);">New Fee Entry</h3>
        <form id="feeForm">
            <div class="form-group"><label>വിദ്യാർത്ഥിയുടെ പേര്</label><input type="text" name="name" required></div>
            <div class="form-group"><label>ക്ലാസ്</label><select name="class" required><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script></select></div>
            <div class="form-group"><label>ഫീ ഇനം (Category)</label><select name="feeType"><option value="Madrasa Fee">Madrasa Fee</option><option value="Bus Fee">Bus Fee</option><option value="Exam Fee">Exam Fee</option></select></div>
            <div class="form-group"><label>മാസം</label><select name="month" id="mSelect"><script>const months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; months.forEach(m => document.write(`<option value="${m}">${m}</option>`));</script></select></div>
            <div class="form-group"><label>വർഷം</label><select name="year"><option value="2026" selected>2026</option><option value="2025">2025</option></select></div>
            <div class="form-group"><label>തുക</label><input type="number" name="amount" required></div>
            <button type="submit" id="saveBtn" class="submit-btn">SAVE</button>
        </form>
        <p id="msg" style="text-align:center; font-weight:bold; color: green;"></p>
    </div>

    <div id="recordPage" class="page">
        <h3 style="text-align:center; color:var(--primary);">Collection Records</h3>
        
        <div class="controls">
            <select id="yearFilter" onchange="loadData()"><option value="2026">2026</option><option value="2025">2025</option></select>
            <select id="monthFilter" onchange="loadData()"><script>months.forEach(m => document.write(`<option value="${m}">${m}</option>`));</script></select>
            <select id="classFilter" onchange="applyFilters()"><option value="All">All Classes</option><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script></select>
            <select id="typeFilter" onchange="applyFilters()">
                <option value="All">All Categories</option>
                <option value="Madrasa Fee">Madrasa Fee</option>
                <option value="Bus Fee">Bus Fee</option>
                <option value="Exam Fee">Exam Fee</option>
            </select>
        </div>

        <div class="table-container">
            <table><thead><tr><th>Date</th><th>Name</th><th>Class</th><th>Type</th><th>Amount</th></tr></thead><tbody id="paidBody"></tbody></table>
        </div>

        <div id="totalDisplay" class="total-box">Total Collection: ₹0</div>

        <h4 style="color:var(--pending); margin-top:30px;">⚠️ ബാക്കിയുള്ളവർ</h4>
        <div class="table-container">
            <table><thead><tr><th>Name</th><th>Class</th><th>Status</th></tr></thead><tbody id="pendingBody"></tbody></table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby8qE1U6YgubT15Gm3T76xNvfN0zgW2Prn7ngUcn3r3jNP_XGLRQeAWAu5yLulDiu37/exec';
    let rawData = [];
    let pendingData = [];

    function openPage(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id === 'recordPage') loadData();
    }

    function loadData() {
        let m = document.getElementById('monthFilter').value;
        let y = document.getElementById('yearFilter').value;
        document.getElementById('paidBody').innerHTML = "<tr><td colspan='5' align='center'>Loading...</td></tr>";
        fetch(`${scriptURL}?month=${m}&year=${y}`).then(r => r.json()).then(d => {
            rawData = d.allData || []; pendingData = d.pending || []; applyFilters();
        });
    }

    function applyFilters() {
        let cf = document.getElementById('classFilter').value;
        let tf = document.getElementById('typeFilter').value;
        let mf = document.getElementById('monthFilter').value;
        let yf = document.getElementById('yearFilter').value;
        let pHTML = "";
        let total = 0;

        rawData.slice(1).forEach(r => {
            // കണ്ടീഷൻ: മാസം + വർഷം + ക്ലാസ് (All അല്ലെങ്കിൽ മാച്ച്) + ടൈപ്പ് (All അല്ലെങ്കിൽ മാച്ച്)
            if(r[5] == mf && r[6] == yf && (cf == "All" || r[2] == cf) && (tf == "All" || r[3] == tf)) {
                let amt = parseFloat(r[4]) || 0;
                total += amt;
                pHTML += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>Class ${r[2]}</td><td>${r[3]}</td><td>₹${amt}</td></tr>`;
            }
        });
        
        document.getElementById('paidBody').innerHTML = pHTML || "<tr><td colspan='5' align='center'>No data.</td></tr>";
        document.getElementById('totalDisplay').innerText = "Total Collection: ₹" + total;

        let pendHTML = "";
        pendingData.forEach(s => {
            if(cf == "All" || s[1] == cf) {
                pendHTML += `<tr><td>${s[0]}</td><td>Class ${s[1]}</td><td style="color:red">Pending ❌</td></tr>`;
            }
        });
        document.getElementById('pendingBody').innerHTML = pendHTML || "<tr><td colspan='3' align='center' style='color:green;'>All cleared! ✅</td></tr>";
    }

    document.getElementById('feeForm').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('msg').innerText = "Saving...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
            .then(() => { alert("Saved!"); window.location.reload(); })
            .catch(() => { alert("Error!"); document.getElementById('saveBtn').disabled = false; });
    });

    window.onload = loadData;
</script>
</body>
</html>
